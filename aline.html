<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Site</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🌟 Meu Primeiro Site</h1>
        <p>Aprendendo HTML e CSS</p>
    </header>

    <nav>
        <a href="#sobre">Sobre</a>
        <a href="#galeria">Galeria</a>
        <a href="#contato">Contato</a>
    </nav>

    <section id="sobre">
        <h2>👤 Sobre Mim</h2>
        <p>
            Este é meu primeiro site desenvolvido com HTML e CSS.
            Estou aprendendo programação e desenvolvimento web.
        </p>
    </section>

    <section id="galeria">
        <h2>🖼️ Galeria</h2>

        <div class="galeria">
            <img src="https://picsum.photos/300/200?1" alt="">
            <img src="https://picsum.photos/300/200?2" alt="">
            <img src="https://picsum.photos/300/200?3" alt="">
        </div>
    </section>

    <section id="contato">
        <h2>📞 Contato</h2>

        <form>
            <input type="text" placeholder="Seu nome">

            <input type="email" placeholder="Seu e-mail">

            <textarea placeholder="Digite sua mensagem"></textarea>

            <button type="submit">
                Enviar
            </button>
        </form>
    </section>

    <footer>
        <p>© 2026 - Meu Primeiro Site</p>
    </footer>

</body>
</html>
